<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Barbearia Elite</title>
    <link rel="stylesheet" href="css/agendamento.css">
</head>
<body>
    <header>
        <h1>Barbearia Elite</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="servicos.html">Serviços</a>
            <a href="galeria.html">Galeria</a>
            <a href="equipe.html">Equipe</a>
            <a href="agendamento.html">Agendamento</a>
        </nav>
    </header>
    <main>
        <section class="titulo">
            <h2>Agende seu Horário</h2>
            <p>
                Preencha o formulário abaixo para solicitar seu atendimento.
            </p>
        </section>
        <section class="area-formulario">
            <form>
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" name="nome" required>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>
                <label for="servico">Serviço:</label>
                <select id="servico" name="servico" required>
                    <option value="">Selecione</option>
                    <option value="corte">Corte Masculino</option>
                    <option value="barba">Barba</option>
                    <option value="sobrancelha">Sobrancelha</option>
                    <option value="combo">Combo Corte + Barba</option>
                </select>
                <label for="data">Data:</label>
                <input type="date" id="data" name="data" required>
                <label for="hora">Horário:</label>
                <input type="time" id="hora" name="hora" required>
                <label for="mensagem">Observações:</label>
                <textarea id="mensagem" name="mensagem" rows="5"></textarea>
                <button type="submit">Agendar</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Rua Avelino freitas, 123 - São Raimundo Nonato - PI</p>
        <p>Telefone: (89) 98145-4647</p>
        <p>&copy; 2026 Barbearia Elite</p>
</body>
</html>
